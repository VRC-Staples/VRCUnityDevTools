---
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      hotfix:
        type: boolean
        default: false
        description: Rebuild and overwrite release at current version

permissions: {}

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    name: Version Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package_name: ${{ steps.resolve.outputs.package_name }}
      version: ${{ steps.resolve.outputs.version }}
      should_release: ${{ steps.decide.outputs.should_release }}
      create_tag: ${{ steps.decide.outputs.create_tag }}
    env:
      IS_HOTFIX: "${{ inputs.hotfix || 'false' }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve package metadata
        id: resolve
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import pathlib

          package_path = pathlib.Path('Packages/com.staples.vrc-unity-dev-tools/package.json')
          if not package_path.exists():
              raise SystemExit('Package manifest not found')

          data = json.loads(package_path.read_text(encoding='utf-8'))
          package_name = str(data.get('name', '')).strip()
          version = str(data.get('version', '')).strip()

          if not package_name:
              raise SystemExit('Package name is empty')
          if not version:
              raise SystemExit('Package version is empty')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              print(f'package_name={package_name}', file=fh)
              print(f'version={version}', file=fh)
          print(f'::notice::Resolved {package_name} version {version}')
          PY

      - name: Decide if release needed
        id: decide
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          import socket
          import sys
          import urllib.error
          import urllib.request

          is_hotfix = os.environ.get('IS_HOTFIX', 'false').strip().lower() == 'true'
          version = os.environ.get('VERSION', '').strip()
          repo = os.environ.get('GITHUB_REPOSITORY', '').strip()
          token = os.environ.get('GITHUB_TOKEN', '').strip()
          output = os.environ['GITHUB_OUTPUT']

          if is_hotfix:
              with open(output, 'a', encoding='utf-8') as fh:
                  print('should_release=true', file=fh)
                  print('create_tag=false', file=fh)
              print('::notice::Hotfix mode on.')
              raise SystemExit(0)

          try:
              version_parts = tuple(int(p) for p in version.split('.'))
          except ValueError:
              raise SystemExit(f'Invalid semantic version: {version}')

          latest_parts = ()
          latest_version = ''
          url = f'https://api.github.com/repos/{repo}/releases/latest'
          req = urllib.request.Request(
              url,
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
              },
          )

          try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                  data = json.loads(resp.read().decode('utf-8'))
              tag_name = str(data.get('tag_name', '')).strip()
              match = re.match(r'^(?:v)?(\d+(?:\.\d+)*)$', tag_name)
              if match:
                  latest_version = tag_name
                  latest_parts = tuple(int(p) for p in match.group(1).split('.'))
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  details = exc.read().decode('utf-8', errors='replace')
                  print(f'::error::GitHub API HTTP {exc.code}: {details[:800]}')
                  sys.exit(1)
          except (urllib.error.URLError, socket.timeout, TimeoutError) as exc:
              print(f'::error::GitHub API transport error: {exc}')
              sys.exit(1)

          def normalize(parts, length):
              return parts + (0,) * (length - len(parts)) if len(parts) < length else parts

          should_release = False
          create_tag = False

          if not latest_parts:
              should_release = True
              create_tag = True
          else:
              max_length = max(len(version_parts), len(latest_parts))
              ours = normalize(version_parts, max_length)
              theirs = normalize(latest_parts, max_length)
              if ours > theirs:
                  should_release = True
                  create_tag = True
              else:
                  print(f'::notice::Version {version} not newer than latest release {latest_version}. Skip.')

          with open(output, 'a', encoding='utf-8') as fh:
              print(f'should_release={str(should_release).lower()}', file=fh)
              print(f'create_tag={str(create_tag).lower()}', file=fh)
          PY

  gate:
    name: Release Gate
    needs: [setup]
    if: needs.setup.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      statuses: read
    steps:
      - name: Validate CI checks for release SHA
        env:
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import socket
          import sys
          import time
          import urllib.error
          import urllib.request

          repo = os.environ['REPO'].strip()
          sha = os.environ['TARGET_SHA'].strip()
          token = os.environ['GITHUB_TOKEN'].strip()

          required_checks = {
              'identity': ['CI / Commit Identity Guard', 'Commit Identity Guard'],
              'lint': ['CI / Super-Linter', 'Super-Linter'],
              'package': ['CI / Package Validation', 'Package Validation'],
          }
          pending_states = {'queued', 'in_progress', 'pending', 'requested', 'waiting'}

          def api_get(path):
              req = urllib.request.Request(
                  f'https://api.github.com/repos/{repo}{path}',
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      return json.loads(resp.read().decode('utf-8'))
              except urllib.error.HTTPError as exc:
                  details = exc.read().decode('utf-8', errors='replace')
                  print(f'::error::GitHub API HTTP {exc.code}: {details[:800]}')
                  sys.exit(1)
              except (urllib.error.URLError, socket.timeout, TimeoutError) as exc:
                  print(f'::error::GitHub API transport error: {exc}')
                  sys.exit(1)

          def observe():
              status_payload = api_get(f'/commits/{sha}/status')
              checks_payload = api_get(f'/commits/{sha}/check-runs?per_page=100')
              observed = {}
              for entry in status_payload.get('statuses', []):
                  context = entry.get('context')
                  state = entry.get('state')
                  if isinstance(context, str) and isinstance(state, str):
                      observed[context] = state
              for run in checks_payload.get('check_runs', []):
                  name = run.get('name')
                  conclusion = run.get('conclusion')
                  status = run.get('status')
                  if isinstance(name, str):
                      observed[name] = conclusion if isinstance(conclusion, str) else status
              return observed

          deadline = time.time() + 1800
          while True:
              observed = observe()
              pending = []
              blocking = []
              for key, aliases in required_checks.items():
                  found = None
                  for alias in aliases:
                      if alias in observed:
                          found = (alias, str(observed[alias]).strip().lower())
                          break
                  if found is None:
                      pending.append(f'missing check for {key}')
                      continue
                  alias, value = found
                  if value == 'success':
                      continue
                  if value in pending_states:
                      pending.append(f'{alias} is {value}')
                  else:
                      blocking.append(f'{alias} is {value}, need success')

              if not pending and not blocking:
                  print('Gate passed.')
                  break
              if blocking:
                  for item in blocking:
                      print(f'::error::{item}')
                  sys.exit(1)
              if time.time() >= deadline:
                  for item in pending:
                      print(f'::error::{item}')
                  print('::error::Timed out waiting for CI checks.')
                  sys.exit(1)
              print('Waiting for CI checks...')
              time.sleep(20)
          PY

  build:
    name: Build & Publish
    needs: [setup, gate]
    if: needs.setup.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      zip_sha256: ${{ steps.compute_zip_hash.outputs.zip_sha256 }}
    env:
      package_name: ${{ needs.setup.outputs.package_name }}
      package_path: Packages/${{ needs.setup.outputs.package_name }}
      release_version: ${{ needs.setup.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set filenames
        run: |
          echo "zip_file=${{ env.package_name }}-${{ env.release_version }}.zip" >> "$GITHUB_ENV"
          echo "unitypackage_file=${{ env.package_name }}-${{ env.release_version }}.unitypackage" >> "$GITHUB_ENV"

      - name: Create package zip
        working-directory: ${{ env.package_path }}
        run: zip -r "${{ github.workspace }}/${{ env.zip_file }}" .
      - name: Compute package zip SHA256
        id: compute_zip_hash
        run: |
          set -euo pipefail
          ZIP_FILE="${{ github.workspace }}/${{ env.zip_file }}"
          if [ ! -f "$ZIP_FILE" ]; then
            echo "::error::Release zip not found at $ZIP_FILE"
            ls -la "$GITHUB_WORKSPACE"
            exit 1
          fi
          ZIP_SHA256=$(sha256sum "$ZIP_FILE" | awk '{print $1}')
          echo "zip_sha256=$ZIP_SHA256" >> "$GITHUB_OUTPUT"


      - name: Track package meta files
        run: find "${{ env.package_path }}/" -name '*.meta' > metaList

      - name: Create UnityPackage
        uses: pCYSl5EDgo/create-unitypackage@v1.2.3
        with:
          package-path: ${{ env.unitypackage_file }}
          include-files: metaList

      - name: Check tag does not already exist
        if: needs.setup.outputs.create_tag == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.release_version }}
        run: |
          set -euo pipefail
          api_url="https://api.github.com/repos/${{ github.repository }}/git/ref/tags/${TAG}"
          http_status=$(curl -s -o /tmp/tag-check.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "${api_url}")
          if [ "${http_status}" = "200" ]; then
            echo "::error::Tag ${TAG} already exists."
            cat /tmp/tag-check.json
            exit 1
          fi
          if [ "${http_status}" != "404" ]; then
            echo "::error::Unexpected HTTP ${http_status} while checking tag ${TAG}."
            cat /tmp/tag-check.json
            exit 1
          fi

      - name: Create tag
        if: needs.setup.outputs.create_tag == 'true'
        uses: rickstaa/action-create-tag@v1
        with:
          tag: ${{ env.release_version }}

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.zip_file }}
            ${{ env.unitypackage_file }}
            ${{ env.package_path }}/package.json
          tag_name: ${{ env.release_version }}

  listing:
    name: Deploy VPM Listing
    needs: [setup, build]
    if: needs.setup.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    env:
      package_name: ${{ needs.setup.outputs.package_name }}
      list_publish_directory: Website
      path_to_ci: ci
    steps:
      - name: Checkout local repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout automation repository
        uses: actions/checkout@v4
        with:
          repository: vrchat-community/package-list-action
          path: ${{ env.path_to_ci }}
          clean: false

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.path_to_ci }}/.nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj') }}

      - name: Build package version listing
        run: >-
          ${{ env.path_to_ci }}/build.cmd BuildRepoListing
          --root ${{ env.path_to_ci }}
          --list-publish-directory $GITHUB_WORKSPACE/${{ env.list_publish_directory }}
          --current-package-name ${{ env.package_name }}
          --source-filename "${{ github.workspace }}/source.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp zipSHA256 into listing
        if: needs.build.outputs.zip_sha256 != ''
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          HASH: ${{ needs.build.outputs.zip_sha256 }}
          PACKAGE_NAME: ${{ needs.setup.outputs.package_name }}
          LISTING_PATH: ${{ github.workspace }}/Website/index.json
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ['LISTING_PATH'])
          if not path.exists():
              raise SystemExit(f"Listing file not found: {path}")
          data = json.loads(path.read_text(encoding='utf-8'))
          package_name = os.environ['PACKAGE_NAME']
          version = os.environ['VERSION']
          hash_value = os.environ['HASH']
          package_entry = data.get('packages', {}).get(package_name)
          if package_entry is None:
              raise SystemExit(f"Package entry '{package_name}' missing from listing")
          version_entry = package_entry.get('versions', {}).get(version)
          if not version_entry:
              raise SystemExit(f"Version {version} missing from listing for package {package_name}")
          version_entry['zipSHA256'] = hash_value
          path.write_text(json.dumps(data, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ env.list_publish_directory }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
